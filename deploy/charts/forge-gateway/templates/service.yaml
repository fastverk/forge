apiVersion: v1
kind: Service
metadata:
  name: {{ include "forge-gateway.fullname" . }}
  labels:
    {{- include "forge-gateway.labels" . | nindent 4 }}
    fastverk.dev/service: forge-gateway
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "forge-gateway.selectorLabels" . | nindent 4 }}
  ports:
    - name: grpc
      port: {{ .Values.grpcPort }}
      targetPort: grpc
      protocol: TCP
