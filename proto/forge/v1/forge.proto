syntax = "proto3";

// Generic forge contract.
//
// The operations a code-hosting "forge" (GitHub, GitLab, …) provides that a
// cross-repo cascade needs: read a repo's default branch + a file, create a
// branch, commit a file, open a change (PR/MR), enable auto-merge, poll the
// change's pipeline, merge, and read the change's state. Modeled ONCE here so
// GitHub and GitLab adapters satisfy a single contract and any tool reuses it
// (DTOs are protos by convention).
//
// In-process consumers (e.g. the wave engine) use a hand-written async `Forge`
// trait whose methods take/return these message types; the gRPC `ForgeService`
// is the same contract for a future forge-gateway daemon.

package forge.v1;

// The write-back and discovery RPCs folded into ForgeService below reuse the
// messages those surfaces already defined, rather than restating them:
//   events.proto    — SetCheckRequest / CommentRequest / SetDeploymentRequest / WriteAck
//   discovery.proto — Repository / Issue / PullRequest and the List*Response types
// Acyclic: events.proto imports discovery.proto, and neither imports this file.
import "forge/v1/events.proto";
import "forge/v1/discovery.proto";

// Which forge a repo lives on.
//
// APPEND only — never renumber. Consumers persist these values (BuildRun,
// RepoBuild, RepoReadiness all carry the forge on a CRD), so a renumber
// silently reinterprets stored records.
//
// A consumer that does not recognize a value MUST reject rather than fall back
// to a default. plugin-forge used to answer "gitlab" for anything that was not
// GitHub, which was harmless with two forges and became a wrong-API status write
// with three.
enum Forge {
  FORGE_UNSPECIFIED = 0;
  FORGE_GITHUB = 1;
  FORGE_GITLAB = 2;
  // geetch — the platform's own API-only forge (fastverk/geetch).
  FORGE_GEETCH = 3;
}

// A repository on a forge. `owner` is the GitHub org/user or the GitLab
// (possibly nested) group path; `name` is the repo/project slug; `host` is the
// instance ("github.com", "gitlab.savvifi.com" — empty = the forge default).
message RepoRef {
  Forge forge = 1;
  string host = 2;
  string owner = 3;
  string name = 4;
}

// A change request: a GitHub pull request or a GitLab merge request.
message ChangeRef {
  // GitHub PR number / GitLab MR iid.
  //
  // Numeric because both forges that existed when this was written use integers.
  // Prefer `id` when it is non-empty — see below.
  uint64 number = 1;
  // Web URL.
  string url = 2;
  // Head/source branch.
  string branch = 3;
  // The forge's OWN change identifier, verbatim, when it is not an integer.
  //
  // Not every forge numbers changes. Rather than widen `number` to a string —
  // which would break both working adapters and the gateway for no gain — an
  // adapter with a non-numeric id fills this and sets `number` best-effort.
  // Consumers should read `id` when non-empty and fall back to `number`.
  string id = 4;
}

// A file's contents + the opaque id needed to update it.
message FileBlob {
  string path = 1;
  // Decoded UTF-8 file contents.
  string content = 2;
  // Opaque id required to update the file: GitHub blob sha / GitLab
  // last_commit_id. Echoed back on CommitFile.
  string blob_sha = 3;
}

// CI/pipeline status for a change's head.
enum CiStatus {
  CI_STATUS_UNSPECIFIED = 0;
  CI_STATUS_NONE = 1;     // no pipeline for this change
  CI_STATUS_PENDING = 2;
  CI_STATUS_RUNNING = 3;
  CI_STATUS_SUCCESS = 4;
  CI_STATUS_FAILED = 5;
  CI_STATUS_CANCELED = 6;
}

enum ChangeState {
  CHANGE_STATE_UNSPECIFIED = 0;
  CHANGE_STATE_OPEN = 1;
  CHANGE_STATE_MERGED = 2;
  CHANGE_STATE_CLOSED = 3;
}

// ── request / response messages ───────────────────────────────────────

message GetDefaultBranchRequest { RepoRef repo = 1; }
message GetDefaultBranchResponse { string branch = 1; }

message ReadFileRequest {
  RepoRef repo = 1;
  string path = 2;
  // Git ref to read from (branch/tag/sha); empty = default branch.
  string ref = 3;
}
message ReadFileResponse {
  FileBlob blob = 1;
  bool found = 2;
}

message CreateBranchRequest {
  RepoRef repo = 1;
  string name = 2;
  string from_sha = 3;
}
message CreateBranchResponse {
  bool created = 1;
  // True when the branch already existed (idempotent re-run); not an error.
  bool already_existed = 2;
}

message CommitFileRequest {
  RepoRef repo = 1;
  string branch = 2;
  string path = 3;
  string content = 4;
  // From ReadFile — required to update an existing file.
  string blob_sha = 5;
  string message = 6;
}
message CommitFileResponse { string commit_sha = 1; }

message OpenChangeRequest {
  RepoRef repo = 1;
  string head = 2;   // source branch
  string base = 3;   // target branch
  string title = 4;
  string body = 5;
  bool remove_source_branch = 6;
}
message OpenChangeResponse {
  ChangeRef change = 1;
  // True when an open change for `head` already existed; not an error.
  bool already_existed = 2;
}

message EnableAutoMergeRequest {
  RepoRef repo = 1;
  ChangeRef change = 2;
}
message EnableAutoMergeResponse { bool enabled = 1; }

message PipelineStatusRequest {
  RepoRef repo = 1;
  ChangeRef change = 2;
}
message PipelineStatusResponse {
  CiStatus status = 1;
  string pipeline_id = 2;
  string pipeline_url = 3;
}

message MergeRequest {
  RepoRef repo = 1;
  ChangeRef change = 2;
}
message MergeResponse { string merge_commit_sha = 1; }

message GetChangeStateRequest {
  RepoRef repo = 1;
  ChangeRef change = 2;
}
message GetChangeStateResponse {
  ChangeState state = 1;
  string merge_commit_sha = 2;
}

// ── inbound triggers (webhooks) ─────────────────────────────────────────
// A configured inbound trigger — a repo/project webhook that delivers push /
// change events to the platform's receiver. This is how a repo's CI is "wired":
// READ them (ListTriggers) to answer "does this repo have incoming triggers
// established?" — feeding a readiness criterion — and ENSURE one (EnsureTrigger)
// to install it, idempotently.
message Trigger {
  // Forge-assigned hook id (GitHub hook id / GitLab hook id), as a string.
  string id = 1;
  // The delivery URL (the fastverk receiver).
  string url = 2;
  // Event names the hook is subscribed to, NORMALIZED across forges to the
  // GitHub vocabulary ("push", "pull_request"); the GitLab adapter maps its
  // boolean flags to/from these.
  repeated string events = 3;
  // Whether the hook is active.
  bool active = 4;
  // Where deliveries actually go, when that is not an HTTPS URL.
  //
  // `url` assumes every forge delivers by POSTing to an endpoint. Not all do —
  // a forge may deliver to a message bus or an internal subscriber, in which
  // case `url` is empty and this carries the real target (a queue name, an ARN,
  // a service address). An adapter that cannot express its delivery as a URL
  // must fill this rather than inventing a plausible-looking one.
  string target = 5;
}

message ListTriggersRequest { RepoRef repo = 1; }
message ListTriggersResponse { repeated Trigger triggers = 1; }

message EnsureTriggerRequest {
  RepoRef repo = 1;
  // Delivery URL to ensure (e.g. https://hooks.fastverk.com/webhook).
  string url = 2;
  // Normalized events to subscribe (empty ⇒ the adapter default: push +
  // pull_request).
  repeated string events = 3;
  // HMAC/verification secret to set on the hook (empty ⇒ leave unset).
  string secret = 4;
}
message EnsureTriggerResponse {
  Trigger trigger = 1;
  // True if this call created the hook; false if it already existed (idempotent).
  bool created = 2;
}

// ── capabilities ──────────────────────────────────────────────────────────
//
// What a forge actually PROVIDES, asked BEFORE anything is attempted.
//
// The contract already has a way to be honest about an unsupported operation
// after the fact — `Protection.unsupported` reports the ProtectionSpec fields a
// forge could not honor. That is the right shape for a partially-honored write.
// It is the wrong shape for "does this forge have issues at all", because it
// only answers after a caller has already asked, and the caller then has to
// decide whether an error means "absent" or "broken".
//
// geetch is the case that forces this: it has no issue tracker and never will
// (its README lists issues, wiki, CI and a package registry as explicitly out of
// scope). A cross-forge `ListIssues` fan-out that dispatches to every configured
// forge and treats geetch's failure as an error is wrong twice over — it does
// work that cannot succeed, and it reports a fault where there is none. With
// capabilities the fan-out simply does not ask.
message ForgeCapabilities {
  // Every ForgeService implementation provides the CORE surface — default
  // branch, file read/write, branches, changes, merge. There is no flag for it:
  // a forge that cannot do those is not a forge, and a bool nobody can set to
  // false is just noise.
  //
  // These flags cover the OPTIONAL surfaces, and default to FALSE on purpose.
  // An adapter built against an older contract does not know a newly-added
  // capability and will report it absent, so a caller skips a surface that might
  // have worked. The other default fails the other way — attempting a surface
  // that does not exist — which is the failure this message exists to remove.
  bool issues = 1;
  // Inbound triggers/webhooks: ListTriggers / EnsureTrigger.
  bool triggers = 2;
  // Commit checks / statuses: SetCheck.
  bool checks = 3;
  // Deployments + environments: SetDeployment.
  bool deployments = 4;
  // Comments on a change or issue: Comment.
  bool comments = 5;
  // Surfaces the contract describes but does not yet act on. Declared so a
  // console can render what a forge offers without a per-forge special case;
  // add the RPCs later without changing this message.
  bool wiki = 6;
  bool pages = 7;
  bool releases = 8;
  bool packages = 9;
}

message GetCapabilitiesRequest {
  // Selects the forge to describe; only `forge` and `host` are read. Repo-level
  // fields are ignored — a per-repo toggle (GitHub lets an individual repo turn
  // issues off) belongs on `Repository`, not here.
  //
  // The answer describes the ADAPTER the server would route to, not the forge
  // product. "GitHub has an issue tracker" is true and useless; what a caller
  // needs is whether THIS server will answer ListIssues for it. Only the
  // adapter-scoped reading makes skipping a surface safe, which is the point.
  RepoRef repo = 1;
}
message GetCapabilitiesResponse {
  ForgeCapabilities capabilities = 1;
}

// The generic forge service. GitHub + GitLab adapters implement these.
service ForgeService {
  rpc GetDefaultBranch(GetDefaultBranchRequest) returns (GetDefaultBranchResponse);
  rpc ReadFile(ReadFileRequest) returns (ReadFileResponse);
  rpc CreateBranch(CreateBranchRequest) returns (CreateBranchResponse);
  rpc CommitFile(CommitFileRequest) returns (CommitFileResponse);
  rpc OpenChange(OpenChangeRequest) returns (OpenChangeResponse);
  rpc EnableAutoMerge(EnableAutoMergeRequest) returns (EnableAutoMergeResponse);
  rpc PipelineStatus(PipelineStatusRequest) returns (PipelineStatusResponse);
  rpc Merge(MergeRequest) returns (MergeResponse);
  rpc GetChangeState(GetChangeStateRequest) returns (GetChangeStateResponse);
  // Inbound trigger (webhook) management.
  rpc ListTriggers(ListTriggersRequest) returns (ListTriggersResponse);
  rpc EnsureTrigger(EnsureTriggerRequest) returns (EnsureTriggerResponse);

  // What this forge provides. Ask before attempting an optional surface; see
  // ForgeCapabilities.
  rpc GetCapabilities(GetCapabilitiesRequest) returns (GetCapabilitiesResponse);

  // ── write-back (was the separate forge.v1.ForgeWrite service) ─────────────
  //
  // Reporting build/deploy state back to the forge that triggered it. These are
  // per-REPO operations routed exactly like every RPC above, which is why they
  // fold in cleanly: a commit status belongs to one repo on one forge.
  //
  // ForgeWrite remains defined in events.proto for existing servers. New callers
  // should use these; the two are the same operations, not competing ones.
  //
  // They take their own request messages rather than ForgeWrite's, for the same
  // routing reason as the discovery RPCs below: ForgeWrite's SetCheckRequest
  // addresses a `Repository`, whose `forge` is the STRING "github"/"gitlab",
  // and its CommentRequest carries no repo at all — only "owner/name#42". Both
  // are routable when the server was configured for one forge up front, which is
  // how the plugin backend works; neither is routable by a service that picks an
  // adapter per request. WriteAck is shared unchanged — a response carries no
  // routing.
  rpc SetCheck(ForgeSetCheckRequest) returns (WriteAck);
  rpc Comment(ForgeCommentRequest) returns (WriteAck);
  rpc SetDeployment(ForgeSetDeploymentRequest) returns (WriteAck);

  // ── discovery, PER FORGE (cf. the cross-forge forge.v1.ForgeDiscovery) ─────
  //
  // These answer for THIS forge only, and deliberately take different request
  // messages than ForgeDiscovery's: those carry a `repeated string forges`
  // filter because they AGGREGATE across every configured forge, which cannot
  // mean anything in a service routed by a single RepoRef.
  //
  // So the split is by layer, not by duplication: ForgeService answers "what
  // does THIS forge have", ForgeDiscovery fans out over several ForgeService
  // backends and concatenates. Folding the aggregating form in here would have
  // put a multi-forge request into a per-forge service and left the routing
  // undefined.
  //
  // Gate these on ForgeCapabilities: `ListIssues` against a forge with
  // `issues = false` is a question with no answer, not a failure.
  rpc ListRepos(ListForgeReposRequest) returns (ListReposResponse);
  rpc ListIssues(ListForgeIssuesRequest) returns (ListIssuesResponse);
  rpc ListPullRequests(ListForgePullRequestsRequest) returns (ListPullRequestsResponse);
}

// Per-forge write-back requests. Same fields as ForgeWrite's, with the repo
// addressed by RepoRef (forge as the ENUM, so the server can route) instead of
// by a Repository whose `forge` is a bare string.
message ForgeSetCheckRequest {
  RepoRef repo = 1;
  // The commit the check reports on.
  string head_sha = 2;
  // Check name, e.g. "fastverk/build".
  string name = 3;
  // queued|in_progress|completed.
  string status = 4;
  // success|failure|neutral|cancelled ("" while still running).
  string conclusion = 5;
  // Where a human goes for detail.
  string details_url = 6;
}

message ForgeCommentRequest {
  RepoRef repo = 1;
  // The change or issue NUMBER within `repo`. ForgeWrite's "owner/name#42" packs
  // repo and number into one string because it had nowhere else to put the repo;
  // with `repo` present the number stands alone and nothing has to be parsed.
  uint64 number = 2;
  string body = 3;
}

message ForgeSetDeploymentRequest {
  RepoRef repo = 1;
  // The commit being deployed.
  string head_sha = 2;
  // e.g. "refs/heads/main".
  string ref = 3;
  // "production" | service name.
  string environment = 4;
  // queued|in_progress|success|failure|inactive.
  string state = 5;
  // The environment URL (the "Visit" link).
  string url = 6;
  // Optional details/log link.
  string log_url = 7;
  // Optional human-readable status line.
  string description = 8;
}

// Per-forge discovery requests. Same shape as ForgeDiscovery's minus the
// `forges` selector — the forge is already fixed by `repo`.
message ListForgeReposRequest {
  // Identifies the forge (and host). Repo-level fields are ignored.
  RepoRef repo = 1;
  // Restrict to these owners / namespaces. Empty = the forge's default.
  repeated string owners = 2;
  // Filter to repos with these labels/topics (best-effort).
  repeated string labels = 3;
}

message ListForgeIssuesRequest {
  RepoRef repo = 1;
  repeated string owners = 2;
  // Filter to issues with these labels (AND semantics).
  repeated string labels = 3;
  repeated string for_users = 4;
}

message ListForgePullRequestsRequest {
  RepoRef repo = 1;
  repeated string owners = 2;
  repeated string labels = 3;
  // Filter to PRs authored by these users.
  repeated string for_users = 4;
}
